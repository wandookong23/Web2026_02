<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <title>실습 2-4</title>
    <style>
      .box{
        width:300px;
        height:70px;     
        margin:0 auto;
      }

			#style1 {        
        background-color:#c8f1bc;          
        color:white;      
      }    
      #style2 {
        color: white;  
        background: linear-gradient(to right, #447934, #b7e6b7);
        text-shadow: 4px 3px 10px yellow ;
      }    
      #style3 {
        color: white;  
        background: linear-gradient(45deg, #cdffbe, #336433);  
        text-shadow: 4px 3px 10px yellow ;
      }    
      h1 {
        text-align: center;
        line-height: 70px;
      }
      #basic{        
      text-shadow: 4px, 3px, 10px, #c8f1bc; 
      }
    </style>
  </head>
  <body>
    <div class="box" id="style1">
      <h1 id="basic">웹 개발 기초</h1>
    </div>
    <div class="box" id="style2">
      <h1>웹 개발 중급</h1>
    </div>
    <div class="box" id="style3">
      <h1>웹 개발 고급</h1>
    </div>
  </body>
</html>
