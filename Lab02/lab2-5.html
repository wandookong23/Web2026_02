<!DOCTYPE html>
<html lang="ko">
<head>

  table{

    caption-side: bottom;

  }
  
  .lef{

  }

  .im{

  }

</style>

</head>
<body>
<table>
    <caption>2023 국민 독서실태</caption>

      </tr>
    </thead>
    <tbody>
      <tr>
        <th class="lef">종이책</th>

      </tr>
      <tr>
        <th class="lef">전자책</th>

        <td>7.1권</td>
      </tr>
      <tr>
        <th class="lef">오디오북</th>

      </tr>      
    </tbody>
  </table>
</body>
</html>
